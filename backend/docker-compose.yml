# Nexus CRM backend — single service.
# Multi-tenancy is handled inside the app (CompId/BranchId), one DB, one
# container — NOT one-container-per-client like eStock. To host a second
# isolated instance, copy this block and change container_name/ports/env_file.
services:
  crm:
    build: .
    container_name: nexus_crm
    restart: always
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: production
      PORT: 5001
      HOST: 0.0.0.0
      # node:20-alpine defaults to UTC; pin to IST so node-mssql (useUTC:false)
      # reads SQL Server's IST wall-clock timestamps correctly.
      TZ: Asia/Kolkata
    env_file:
      - .env.prd
    volumes:
      # Per-client uploads: the app always writes to /app/uploads; each client
      # container mounts its own host dir here, so files never cross clients and
      # survive rebuilds. Copy this block + rename the host dir for a new client.
      - ./CRMUploads:/app/uploads
    networks:
      - nexus_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  nexus_network:
    driver: bridge
